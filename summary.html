<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模型能力边界总结</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f9f7f3;
  --bg-card: #ffffff;
  --text: #1a1715;
  --text-secondary: #6b6560;
  --text-tertiary: #9b9590;
  --border: #e8e4df;
  --accent: #c75b39;
  --accent-light: #fdf3f0;
  --shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 4px 20px rgba(0, 0, 0, 0.03);
  --shadow-hover: 0 4px 32px rgba(0, 0, 0, 0.08);
  --radius: 16px;
  --max-width: 960px;
}

body {
  font-family: "Söhne", -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

::selection { background: var(--accent-light); color: var(--accent); }

/* Reveal */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-d1 { transition-delay: 0.1s; }
.reveal-d2 { transition-delay: 0.2s; }

/* Layout */
section { padding: 100px 24px; }
.inner { max-width: var(--max-width); margin: 0 auto; }
.section-eyebrow {
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}
.section-heading {
  font-size: clamp(28px, 4vw, 40px);
  font-weight: 650;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 12px;
}
.section-desc {
  font-size: 16px;
  color: var(--text-secondary);
  max-width: 560px;
}

/* Hero */
.hero {
  min-height: 70vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 24px;
}
.hero-inner { max-width: 680px; }
.hero h1 {
  font-size: clamp(36px, 6vw, 56px);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 20px;
  color: var(--text);
}
.hero p {
  font-size: clamp(16px, 2vw, 20px);
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* Tier Cards */
.tier-row { margin-bottom: 36px; }
.tier-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-tertiary);
  margin-bottom: 12px;
  padding-left: 4px;
}
.tier-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
}
.t-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: box-shadow 0.25s, transform 0.25s;
}
.t-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.t-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.t-card .role { font-size: 13px; color: var(--text-tertiary); margin-bottom: 14px; }
.t-card .stats { display: flex; gap: 16px; }
.t-card .stat-val { font-size: 16px; font-weight: 600; }
.t-card .stat-lbl { font-size: 11px; color: var(--text-tertiary); }

/* Chart Wrapper */
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow);
  margin-top: 40px;
}
.chart-box { width: 100%; height: 400px; }

/* Toggles (reused) */
.pill-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 20px;
}
.pill {
  padding: 7px 16px;
  border-radius: 100px;
  border: 1.5px solid var(--border);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg-card);
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.active { background: var(--text); border-color: var(--text); color: #fff; }

/* Metrics */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 40px;
}
.m-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  box-shadow: var(--shadow);
}
.m-card h4 { font-size: 13px; color: var(--text-tertiary); margin-bottom: 16px; font-weight: 500; }
.m-chart { width: 100%; height: 260px; }

/* Detail Tabs */
.detail-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 36px;
  margin-bottom: 24px;
}
.detail-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px;
  box-shadow: var(--shadow);
  animation: panelIn 0.35s ease;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.dp-header { margin-bottom: 24px; }
.dp-header h3 { font-size: 22px; font-weight: 650; margin-bottom: 4px; }
.dp-header .role { font-size: 14px; color: var(--text-tertiary); }
.dp-persona {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.8;
  margin-bottom: 28px;
}
.dp-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  margin-bottom: 28px;
}
.dp-col h4 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text);
  margin-bottom: 10px;
}
.dp-col ul { list-style: none; padding: 0; }
.dp-col li {
  font-size: 14px;
  color: var(--text-secondary);
  padding: 5px 0 5px 16px;
  position: relative;
  line-height: 1.6;
}
.dp-col li::before {
  content: '';
  position: absolute;
  left: 0; top: 13px;
  width: 5px; height: 5px;
  border-radius: 50%;
}
.dp-col.str li::before { background: #3d9; }
.dp-col.weak li::before { background: #f76; }
.dp-tags { margin-bottom: 28px; }
.dp-tags h4 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 10px;
}
.dp-tags .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.tag {
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
}
.tag.good { background: #edf9f3; color: #1a7a4a; }
.tag.bad { background: #fef2f0; color: #b03020; }
.dp-quote {
  font-size: 14px;
  color: var(--text-tertiary);
  border-left: 2px solid var(--border);
  padding: 10px 20px;
  background: var(--bg);
  border-radius: 0 10px 10px 0;
  line-height: 1.7;
  font-style: italic;
}

/* Scenario */
.scenario-section { background: var(--bg-card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.sc-answer {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  display: none;
  animation: panelIn 0.3s ease;
}
.sc-answer.visible { display: block; }
.sc-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.sc-lbl { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; min-width: 40px; }
.sc-lbl.f { color: #1a7a4a; }
.sc-lbl.b { color: var(--accent); }
.sc-lbl.a { color: #b03020; }
.sc-model { font-size: 15px; font-weight: 500; }
.sc-reason { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-tertiary); }

/* Footer */
.footer { padding: 48px 24px; text-align: center; }
.footer p { font-size: 13px; color: var(--text-tertiary); margin-bottom: 6px; }
.footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
.footer a:hover { text-decoration: underline; }

@media (max-width: 768px) {
  section { padding: 64px 20px; }
  .metrics-row { grid-template-columns: 1fr; }
  .dp-cols { grid-template-columns: 1fr; }
  .tier-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<section class="hero">
  <div class="hero-inner">
    <h1 class="reveal">9个模型，一份答案。</h1>

</section>

<section>
  <div class="inner">

<section>

<section>
  <div class="inner">

    <div id="dPanel"></div>
  </div>
</section>

<section class="scenario-section">
  <div class="inner">
    <p class="section-eyebrow reveal">Guide</p>
    <h2 class="section-heading reveal">场景选型</h2>
    <p class="section-desc reveal">选一个场景，看推荐。</p>
    <div class="pill-row reveal" id="scPills" style="margin-top: 32px;"></div>
    <div class="sc-answer" id="scAnswer" style="margin-top: 20px;"></div>
  </div>
</section>

<footer class="footer">
  <p>数据来源：160+ 道模型边界测试 · LLM Judge 自动评估 + 人工定性分析</p>

</footer>

  { n: "批量自动化", f: "Qwen3.5-397B", b: "DeepSeek-V3", a: "Kimi、文心5.1", r: "稳定性+速度优先" },
  { n: "实时审核", f: "DeepSeek-V3", b: "Claude", a: "Kimi", r: "极快速度+精准判断" },
  { n: "创意写作", f: "文心5.0", b: "GLM-5.1", a: "Claude", r: "文学感和画面感" },
  { n: "数据分析", f: "Qwen3.5-397B", b: "GLM-5.1", a: "文心5.1", r: "准确+标注不确定性" },
  { n: "代码生成", f: "Claude Opus 4.6", b: "Qwen3.5", a: "文心系列", r: "格式精确+逻辑严密" },
  { n: "教育内容", f: "GLM-5.1", b: "Qwen3.5", a: "—", r: "深度+准确+生动" },
  { n: "头脑风暴", f: "文心5.0", b: "GLM-5.1", a: "Claude", r: "发散力强" },
  { n: "商业模式", f: "DeepSeek-V4-Pro", b: "GLM-5.1", a: "Kimi", r: "完整数学推演+方案" },
  { n: "客服对话", f: "Qwen3.5-397B", b: "GPT-5.5", a: "Claude", r: "均衡自然有温度" },
];

const DIMS = ['约束执行','信息密度','独立思考','元认知','速度','可靠性'];

// --- Tier ---
function renderTiers() {
  const c = document.getElementById('tierContainer');
  const tiers = [{k:'S',l:'S 级 · 行业标杆'},{k:'S-',l:'S- 级 · 综合极强'},{k:'A+',l:'A+ 级 · 单项突出'},{k:'A',l:'A 级 · 有条件可用'},{k:'B+',l:'B+ 级 · 不推荐生产'}];
  c.innerHTML = tiers.map(t => {
    const ms = MODELS.filter(m => m.tier === t.k);
    if (!ms.length) return '';
    return `<div class="tier-row reveal"><div class="tier-label">${t.l}</div><div class="tier-grid">${ms.map(m => `
      <div class="t-card" onclick="openDetail('${m.name}')">
        <h3>${m.name}</h3>
        <div class="role">${m.role}</div>
        <div class="stats">
          <div class="stat"><span class="stat-val">${m.len>=1000?(m.len/1000).toFixed(1)+'k':m.len}</span><span class="stat-lbl">字/题</span></div>
          <div class="stat"><span class="stat-val">${m.time?m.time+'s':'—'}</span><span class="stat-lbl">耗时</span></div>
          <div class="stat"><span class="stat-val">${m.rel}%</span><span class="stat-lbl">可靠</span></div>
        </div>
      </div>`).join('')}</div></div>`;
  }).join('');
}

// --- Radar ---
function renderRadar() {
  const tg = document.getElementById('radarToggles');
  const on = new Set([0,2,3,4]);
  tg.innerHTML = MODELS.map((m,i) => `<div class="pill ${on.has(i)?'active':''}" data-i="${i}" onclick="togRadar(this)"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${m.color};margin-right:4px;"></span>${m.name.replace('-397B','').replace(' Opus 4.6','')}</div>`).join('');
  drawRadar();
}
function togRadar(el) { el.classList.toggle('active'); drawRadar(); }
function drawRadar() {
  const sel = [...document.querySelectorAll('#radarToggles .pill.active')].map(e => +e.dataset.i);
  const ch = echarts.init(document.getElementById('radarChart'));
  ch.setOption({
    tooltip: {},
    legend: { show: false },
    radar: { indicator: DIMS.map(d => ({name:d,max:5})), radius:'65%', axisName:{color:'#6b6560',fontSize:12}, splitArea:{areaStyle:{color:['#faf9f7','#f5f3ef']}}, splitLine:{lineStyle:{color:'#e8e4df'}}, axisLine:{lineStyle:{color:'#e8e4df'}} },
    series: [{ type:'radar', data: sel.map(i => ({value:MODELS[i].scores, name:MODELS[i].name, lineStyle:{width:2.5}, areaStyle:{opacity:0.06}, itemStyle:{color:MODELS[i].color}, symbol:'circle', symbolSize:5})) }]
  }, true);
  window.addEventListener('resize', () => ch.resize());
}

// --- Metrics ---
function renderMetrics() {
  const ns = MODELS.map(m => m.name.split(/[-\s]/)[0]);
  const cs = MODELS.map(m => m.color);
  const opt = (el, data, fmt) => {
    const c = echarts.init(document.getElementById(el));
    c.setOption({ tooltip:{trigger:'axis'}, xAxis:{type:'category',data:ns,axisLabel:{fontSize:10,color:'#9b9590',rotate:30},axisLine:{lineStyle:{color:'#e8e4df'}}}, yAxis:{type:'value',axisLabel:{color:'#9b9590',fontSize:10,formatter:fmt||'{value}'},splitLine:{lineStyle:{color:'#f0ece8'}}}, series:[{type:'bar',data:data.map((v,i)=>({value:v,itemStyle:{color:cs[i],borderRadius:[3,3,0,0]}})),barWidth:'44%'}], grid:{left:50,right:10,bottom:50,top:10} });
    window.addEventListener('resize', () => c.resize());
  };
  opt('cLen', MODELS.map(m=>m.len));
  opt('cSpd', MODELS.map(m=>m.time||0));
  opt('cRel', MODELS.map(m=>m.rel), '{value}%');
}

// --- Details ---
function renderDetails() {
  const tabs = document.getElementById('dTabs');
  tabs.innerHTML = MODELS.map((m,i) => `<div class="pill ${i===0?'active':''}" data-i="${i}" onclick="showD(${i})">${m.name.replace('-397B','').replace(' Opus 4.6','')}</div>`).join('');
  showD(0);
}
function showD(i) {
  document.querySelectorAll('#dTabs .pill').forEach((p,j) => p.classList.toggle('active', j===i));
  const m = MODELS[i];
  document.getElementById('dPanel').innerHTML = `
    <div class="detail-panel">
      <div class="dp-header"><h3 style="color:${m.color}">${m.name}</h3><span class="role">${m.role}</span></div>
      <p class="dp-persona">${m.d.p}</p>
      <div class="dp-cols">
        <div class="dp-col str"><h4>核心优势</h4><ul>${m.d.s.map(x=>`<li>${x}</li>`).join('')}</ul></div>
        <div class="dp-col weak"><h4>短板</h4><ul>${m.d.w.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      </div>
      <div class="dp-tags">
        <h4>适配场景</h4>
        <div class="tag-row">${m.d.g.map(x=>`<span class="tag good">${x}</span>`).join('')}</div>
        <div class="tag-row">${m.d.b.map(x=>`<span class="tag bad">${x}</span>`).join('')}</div>
      </div>
      <div class="dp-quote">${m.d.q}</div>
    </div>`;
}
function openDetail(name) {
  const i = MODELS.findIndex(m => m.name === name);
  if (i >= 0) { document.getElementById('dTabs').scrollIntoView({behavior:'smooth',block:'start'}); setTimeout(()=>showD(i),300); }
}

// --- Scenarios ---
function renderSc() {
  document.getElementById('scPills').innerHTML = SCENARIOS.map((s,i) => `<div class="pill" onclick="showSc(${i})">${s.n}</div>`).join('');
}
function showSc(i) {
  document.querySelectorAll('#scPills .pill').forEach((p,j) => p.classList.toggle('active', j===i));
  const s = SCENARIOS[i], el = document.getElementById('scAnswer');
  el.classList.add('visible');
  el.innerHTML = `<div class="sc-row"><span class="sc-lbl f">首选</span><span class="sc-model">${s.f}</span></div><div class="sc-row"><span class="sc-lbl b">备选</span><span class="sc-model">${s.b}</span></div><div class="sc-row"><span class="sc-lbl a">避免</span><span class="sc-model">${s.a}</span></div><div class="sc-reason">${s.r}</div>`;
}

// --- Reveal ---
function initReveal() {
  const ob = new IntersectionObserver(es => { es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }); }, {threshold:0.1, rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.reveal').forEach(el => ob.observe(el));
}

// Init
renderTiers(); renderRadar(); renderMetrics(); renderDetails(); renderSc();
setTimeout(initReveal, 80);
</script>
</body>
</html>
